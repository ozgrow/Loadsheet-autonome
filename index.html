<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loadsheet Autonome</title>
    <link rel="stylesheet" href="static/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-screen">
    <form id="loginForm" class="login-box">
        <div class="login-logo">LOADSHEET</div>
        <h2>Accès sécurisé</h2>
        <label for="loginPass">Mot de passe</label>
        <input type="password" id="loginPass" required autocomplete="current-password" placeholder="Mot de passe" autofocus>
        <div id="loginError" class="login-error"></div>
        <button type="submit" id="loginBtn" class="btn btn-primary" style="width:100%;margin-top:10px;">Se connecter</button>
        <div style="text-align:center;margin-top:15px;color:#a0aec0;font-size:0.75em;" id="loginVersion"></div>
    </form>
</div>

<!-- APP SCREEN -->
<div id="appScreen" style="display:none">
<div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;">
        <h1>Loadsheet Autonome</h1>
        <span id="appVersion" style="font-size:0.75em;color:#a0aec0;"></span>
        <button class="btn btn-secondary" onclick="logout()" style="font-size:0.8em;">Déconnexion</button>
    </div>

    <!-- Manifest Header -->
    <div class="manifest-header">
        <div>
            <span style="color:#718096">Manifeste :</span>
            <span class="manifest-id" id="manifestId"></span>
        </div>
        <span class="status status-draft" id="manifestStatus">Brouillon</span>
    </div>

    <!-- PMC Container -->
    <div id="pmcContainer"></div>

    <!-- Actions -->
    <div class="actions">
        <button class="btn btn-primary" onclick="addPmc()">+ Ajouter une PMC</button>
        <button class="btn btn-success" onclick="showGenerateSection()">Générer Loadsheet</button>
    </div>

    <!-- Generate Section -->
    <div class="generate-section" id="generateSection">
        <h2>Envoi de la Loadsheet</h2>
        <label for="recipients">Destinataires (À) :</label>
        <input type="text" id="recipients" placeholder="email1@example.com, email2@example.com">

        <label for="cc">CC :</label>
        <input type="text" id="cc" value="valere.simonet@gmail.com">

        <div class="actions">
            <button class="btn btn-success" onclick="generatePdf()">Générer le PDF</button>
        </div>
    </div>
</div>
</div>

<script src="static/js/app.js"></script>
<script src="static/js/auth.js"></script>
</body>
</html>
