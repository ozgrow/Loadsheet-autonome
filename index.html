<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loadsheet - ATH Paris Roissy</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        #loginScreen {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; position: fixed; top:0; left:0; right:0; bottom:0;
            background: linear-gradient(135deg, #1a3a5c 0%, #2c5282 100%); z-index: 1000;
        }
        #appScreen { display: none; }
        .login-box {
            background: #fff; padding: 40px; border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3); width: 100%; max-width: 380px;
        }
        .login-box h2 { text-align: center; margin-bottom: 20px; color: #1a3a5c; }
        .login-box label { font-weight: 600; display: block; margin-bottom: 4px; margin-top: 12px; }
        .login-box input { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 1em; box-sizing: border-box; }
        .login-logo { text-align: center; padding: 10px; margin-bottom: 20px; }
        .login-logo span { font-size: 1.4em; font-weight: bold; color: #1a3a5c; letter-spacing: 2px; }
        .login-logo small { display: block; font-size: 0.7em; color: #718096; margin-top: 4px; }
        .login-error { color: #e53e3e; font-size: 0.9em; margin-top: 8px; text-align: center; min-height: 1.2em; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9em; font-weight: 600; }
        .btn-primary { background: #2c5282; color: #fff; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
    <form id="loginForm" class="login-box">
        <div class="login-logo">
            <span>ATH LOADSHEET</span>
            <small>Air Terminal Handling - Paris Roissy</small>
        </div>
        <h2>Acces securise</h2>
        <label for="loginPass">Mot de passe</label>
        <input type="password" id="loginPass" required autocomplete="current-password" placeholder="Mot de passe" autofocus>
        <div id="loginError" class="login-error"></div>
        <button type="submit" id="loginBtn" class="btn btn-primary" style="width:100%;margin-top:10px;">Se connecter</button>
        <div style="text-align:center;margin-top:15px;color:#a0aec0;font-size:0.75em;" id="loginVersion"></div>
    </form>
</div>

<!-- APP SCREEN -->
<div id="appScreen">
<div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div>
            <h1 style="margin-bottom:2px;">Loadsheet</h1>
            <small style="color:#718096;">ATH - Air Terminal Handling - Paris Roissy</small>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
            <span id="appVersion" style="font-size:0.75em;color:#a0aec0;"></span>
            <button class="btn btn-primary" onclick="newManifest()" style="font-size:0.8em;">Nouveau manifeste</button>
            <button class="btn btn-secondary" onclick="logout()" style="font-size:0.8em;">Deconnexion</button>
        </div>
    </div>

    <!-- Manifest Header -->
    <div class="manifest-header">
        <div style="display:flex;align-items:flex-start;gap:15px;flex-wrap:wrap;width:100%;">
            <div>
                <span style="color:#718096">Manifeste :</span>
                <span class="manifest-id" id="manifestId"></span>
                <span class="status status-draft" id="manifestStatus">Brouillon</span>
            </div>
            <div style="flex:1;min-width:150px;">
                <label style="color:#718096;font-size:0.85em;display:block;">Client :</label>
                <input type="text" id="clientName" placeholder="Nom du client" style="padding:6px 10px;border:1px solid #cbd5e0;border-radius:4px;font-size:0.95em;width:100%;max-width:250px;">
            </div>
            <div style="min-width:120px;">
                <label style="color:#718096;font-size:0.85em;display:block;">Agent * :</label>
                <input type="text" id="agentName" placeholder="Nom agent" required style="padding:6px 10px;border:1px solid #cbd5e0;border-radius:4px;font-size:0.95em;width:100%;max-width:180px;">
            </div>
            <div style="min-width:80px;">
                <label style="color:#718096;font-size:0.85em;display:block;">Dest * :</label>
                <input type="text" id="destAirport" placeholder="CDG" required maxlength="3" style="padding:6px 10px;border:1px solid #cbd5e0;border-radius:4px;font-size:0.95em;width:80px;text-transform:uppercase;">
            </div>
        </div>
    </div>

    <!-- Saved Manifests -->
    <div id="savedManifestsSection" class="saved-section">
        <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;" onclick="toggleSavedManifests()">
            <h3 style="margin:0;">Manifestes enregistres (<span id="savedCount">0</span>)</h3>
            <span id="savedToggle" style="font-size:0.8em;color:#718096;">Afficher</span>
        </div>
        <div id="savedManifestsList" style="display:none;margin-top:10px;"></div>
    </div>

    <!-- ULD Container -->
    <div id="pmcContainer"></div>

    <!-- Actions -->
    <div class="actions">
        <button class="btn btn-primary" onclick="addUld()">+ Ajouter une ULD</button>
        <button class="btn btn-success" onclick="showGenerateSection()">Generer Loadsheet</button>
        <button class="btn btn-secondary" onclick="saveManifest()">Sauvegarder</button>
    </div>

    <!-- Generate Section -->
    <div class="generate-section" id="generateSection">
        <h2>Envoi de la Loadsheet</h2>
        <label for="recipients">Destinataires (A) :</label>
        <input type="text" id="recipients" placeholder="email1@example.com, email2@example.com">
        <label for="cc">CC :</label>
        <input type="text" id="cc" value="valere.simonet@gmail.com">
        <div class="actions">
            <button class="btn btn-success" onclick="generatePdf()">Generer le PDF</button>
        </div>
    </div>
</div>
</div>

<script src="/static/js/logo.js"></script>
<script src="/static/js/app.js"></script>
<script src="/static/js/auth.js"></script>
</body>
</html>
