<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loadsheet - ATH Paris Roissy</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        #loginScreen {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; position: fixed; top:0; left:0; right:0; bottom:0;
            background: linear-gradient(135deg, #1a3a5c 0%, #2c5282 100%); z-index: 1000;
        }
        #appScreen { display: none; }
        .login-box {
            background: #fff; padding: 40px; border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3); width: 100%; max-width: 380px;
        }
        .login-box h2 { text-align: center; margin-bottom: 20px; color: #1a3a5c; }
        .login-box label { font-weight: 600; display: block; margin-bottom: 4px; margin-top: 12px; }
        .login-box input { width: 100%; padding: 10px 12px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 1em; box-sizing: border-box; }
        .login-logo { text-align: center; padding: 10px; margin-bottom: 20px; }
        .login-logo span { font-size: 1.4em; font-weight: bold; color: #1a3a5c; letter-spacing: 2px; }
        .login-logo small { display: block; font-size: 0.7em; color: #718096; margin-top: 4px; }
        .login-error { color: #e53e3e; font-size: 0.9em; margin-top: 8px; text-align: center; min-height: 1.2em; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9em; font-weight: 600; }
        .btn-primary { background: #2c5282; color: #fff; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
    <form id="loginForm" class="login-box">
        <div class="login-logo">
            <span>ATH LOADSHEET</span>
            <small>Air Terminal Handling - Paris Roissy</small>
        </div>
        <h2>Acces securise</h2>
        <label for="loginPass">Mot de passe</label>
        <input type="password" id="loginPass" required autocomplete="current-password" placeholder="Mot de passe" autofocus>
        <div id="loginError" class="login-error"></div>
        <button type="submit" id="loginBtn" class="btn btn-primary btn-full">Se connecter</button>
        <div class="version-label" id="loginVersion"></div>
    </form>
</div>

<!-- APP SCREEN -->
<div id="appScreen">
<div class="container">
    <div class="app-topbar">
        <div class="app-topbar-title">
            <h1>Loadsheet</h1>
            <small class="text-muted">ATH - Air Terminal Handling - Paris Roissy</small>
        </div>
        <div class="app-topbar-actions">
            <span id="appVersion" class="version-label"></span>
            <button class="btn btn-primary btn-sm" onclick="newManifest()">Nouveau manifeste</button>
            <button class="btn btn-secondary btn-sm" onclick="logout()">Deconnexion</button>
        </div>
    </div>

    <!-- Manifest Header -->
    <div class="manifest-header">
        <div class="manifest-fields">
            <div class="manifest-id-row">
                <span class="text-muted">Manifeste :</span>
                <span class="manifest-id" id="manifestId"></span>
                <span class="status status-draft" id="manifestStatus">Brouillon</span>
            </div>
            <div class="field-group">
                <label class="field-label">Client :</label>
                <input type="text" id="clientName" class="field-input" placeholder="Nom du client">
            </div>
            <div class="field-group field-agent">
                <label class="field-label">Agent * :</label>
                <input type="text" id="agentName" class="field-input" placeholder="Nom agent" required>
            </div>
            <div class="field-group field-dest">
                <label class="field-label">Dest * :</label>
                <input type="text" id="destAirport" class="field-input field-input-short" placeholder="CDG" required maxlength="3">
            </div>
        </div>
    </div>

    <!-- Saved Manifests -->
    <div id="savedManifestsSection" class="saved-section">
        <div class="saved-header" onclick="toggleSavedManifests()">
            <h3>Manifestes enregistres (<span id="savedCount">0</span>)</h3>
            <span id="savedToggle" class="text-muted btn-sm">Afficher</span>
        </div>
        <div id="savedManifestsList" class="saved-list"></div>
    </div>

    <!-- ULD Container -->
    <div id="pmcContainer"></div>

    <!-- Recap live -->
    <div id="liveRecap" class="live-recap"></div>

    <!-- Actions -->
    <div class="actions">
        <button class="btn btn-primary" onclick="addUld()">+ Ajouter une ULD</button>
        <button class="btn btn-success" onclick="showGenerateSection()">Generer Loadsheet</button>
        <button class="btn btn-secondary" onclick="saveManifest()">Sauvegarder</button>
    </div>

    <!-- Generate Section -->
    <div class="generate-section" id="generateSection">
        <h2>Envoi de la Loadsheet</h2>
        <label for="recipients">Destinataires (A) :</label>
        <input type="text" id="recipients" placeholder="email1@example.com, email2@example.com">
        <label for="cc">CC :</label>
        <input type="text" id="cc" placeholder="CC supplementaires (CC par defaut cote serveur)">
        <div class="actions">
            <button class="btn btn-success" onclick="generatePdf()">Generer le PDF</button>
            <button class="btn btn-primary" id="sendEmailBtn" onclick="sendEmail()">Envoyer par email</button>
        </div>
    </div>
</div>
</div>

<div style="text-align:center;padding:10px 0 4px;"><a href="/tests/tests.html" style="font-size:0.7em;color:#a0aec0;text-decoration:none;">Tests</a></div>
<script src="/static/js/logo.js"></script>
<script src="/static/js/app.js"></script>
<script src="/static/js/auth.js"></script>
</body>
</html>
