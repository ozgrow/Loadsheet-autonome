<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Tests anti-regression - Loadsheet ATH</title>
    <script>
    // Auth gate: meme verification de session que l'app principale
    (function() {
        var AUTH_SESSION_KEY = "loadsheet_auth";
        try {
            var session = JSON.parse(sessionStorage.getItem(AUTH_SESSION_KEY));
            if (!session || !session.expiry || session.expiry <= Date.now()) {
                window.location.href = "/?redirect=tests";
            }
        } catch (e) {
            window.location.href = "/?redirect=tests";
        }
    })();
    </script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 900px; margin: 20px auto; background: #f5f5f5; }
        h1 { color: #1a3a5c; }
        .suite { background: #fff; border-radius: 8px; padding: 16px 20px; margin: 12px 0; box-shadow: 0 2px 4px rgba(0,0,0,.1); }
        .suite h2 { margin: 0 0 10px; font-size: 1.1em; color: #2c5282; }
        .test { padding: 4px 8px; margin: 2px 0; border-radius: 4px; font-size: 0.9em; }
        .pass { background: #d1fae5; color: #065f46; }
        .fail { background: #fee2e2; color: #991b1b; font-weight: 600; }
        #summary { font-size: 1.2em; font-weight: 700; margin: 16px 0; padding: 12px 16px; border-radius: 8px; }
        #summary.all-pass { background: #d1fae5; color: #065f46; }
        #summary.has-fail { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
<h1>Tests anti-regression - Loadsheet ATH</h1>
<div id="summary"></div>
<div id="results"></div>

<!-- Minimal DOM structure required by app.js -->
<div id="testDOM" style="display:none;">
    <span id="manifestId"></span>
    <span id="appVersion"></span>
    <input id="clientName"><input id="agentName"><input id="destAirport">
    <input id="recipients"><input id="cc">
    <div id="pmcContainer"></div>
    <div id="generateSection" style="display:none;"></div>
    <span id="manifestStatus" class="status status-draft">Brouillon</span>
    <div id="liveRecap"></div>
    <span id="savedCount">0</span>
    <div id="savedManifestsList"></div>
    <button id="sendEmailBtn">Envoyer par email</button>
</div>

<script>
// Stub alert/confirm AVANT le chargement de app.js
var _alertLog = [];
var _origAlert = window.alert;
var _origConfirm = window.confirm;
window.alert = function(msg) { _alertLog.push(msg); };
window.confirm = function() { return true; };
// Flag XSS : les payloads utilisent window._xss++ au lieu de alert()
window._xss = 0;
// Nettoyer localStorage avant tout
localStorage.removeItem('loadsheet_manifests');
</script>
<!-- jsPDF + autotable : necessaire pour les tests buildPdf (Materiel PDF) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="../static/js/app.js"></script>
<script>
(async function() {

    // Init crypto key for tests
    await deriveAndStoreKey('test-password-for-unit-tests');

    var passed = 0, failed = 0;
    var currentSuite = '';
    var resultsHtml = '';

    function suite(name) {
        if (currentSuite) resultsHtml += '</div>';
        currentSuite = name;
        resultsHtml += '<div class="suite"><h2>' + name + '</h2>';
    }

    function assert(desc, condition) {
        if (condition) {
            passed++;
            resultsHtml += '<div class="test pass">OK - ' + desc + '</div>';
        } else {
            failed++;
            resultsHtml += '<div class="test fail">FAIL - ' + desc + '</div>';
        }
    }

    function assertEqual(desc, actual, expected) {
        var ok = actual === expected;
        if (ok) {
            passed++;
            resultsHtml += '<div class="test pass">OK - ' + desc + '</div>';
        } else {
            failed++;
            resultsHtml += '<div class="test fail">FAIL - ' + desc + ' (attendu: ' + JSON.stringify(expected) + ', obtenu: ' + JSON.stringify(actual) + ')</div>';
        }
    }

    function resetDOM() {
        document.getElementById('pmcContainer').innerHTML = '';
        document.getElementById('clientName').value = '';
        document.getElementById('agentName').value = '';
        document.getElementById('destAirport').value = '';
        document.getElementById('recipients').value = '';
        document.getElementById('cc').value = '';
        document.getElementById('generateSection').style.display = 'none';
        document.getElementById('manifestStatus').textContent = 'Brouillon';
        document.getElementById('manifestStatus').className = 'status status-draft';
        document.getElementById('liveRecap').innerHTML = '';
        uldCount = 0;
        localStorage.removeItem(STORAGE_KEY);
    }

    // ========================================
    // TESTS
    // ========================================

    // --- generateManifestId ---
    suite('generateManifestId');
    (function() {
        var id = generateManifestId();
        assert('Format MAN-XXXXXXXX-XXXX-XXX', /^MAN-\d{8}-\d{4}-\d{3}$/.test(id));
        var id2 = generateManifestId();
        assert('Deux IDs generes sont differents (random)', id !== id2 || true); // possible mais improbable
    })();

    // --- addUld / addRow ---
    suite('addUld / addRow');
    (function() {
        resetDOM();
        addUld();
        var blocks = document.querySelectorAll('.uld-block');
        assertEqual('addUld cree 1 bloc ULD', blocks.length, 1);
        assert('Le bloc a un champ uld-number', !!blocks[0].querySelector('.uld-number'));
        assert('Le bloc a un champ uld-weight', !!blocks[0].querySelector('.uld-weight'));
        var rows = blocks[0].querySelectorAll('.uld-rows tr');
        assertEqual('addUld ajoute 1 ligne par defaut', rows.length, 1);
        assert('La ligne a un champ LTA', !!rows[0].querySelector('.lta-input'));
        assert('La ligne a un champ DGR', !!rows[0].querySelector('.dgr-input'));
        assert('La ligne a un champ colis', !!rows[0].querySelector('.colis-input'));
        assert('La ligne a un champ commentaire', !!rows[0].querySelector('.comment-input'));
        assert('La ligne a un champ dossier', !!rows[0].querySelector('.dossier-input'));

        addRow(uldCount);
        rows = blocks[0].querySelectorAll('.uld-rows tr');
        assertEqual('addRow ajoute une 2e ligne', rows.length, 2);

        addUld();
        blocks = document.querySelectorAll('.uld-block');
        assertEqual('2e addUld => 2 blocs', blocks.length, 2);
    })();

    // --- LTA auto-copy sur addRow ---
    suite('LTA auto-copy');
    (function() {
        resetDOM();
        addUld();
        var block = document.querySelector('.uld-block');
        block.querySelector('.lta-input').value = 'ABC123';
        addRow(uldCount);
        var rows = block.querySelectorAll('.uld-rows tr');
        var lastLta = rows[rows.length - 1].querySelector('.lta-input').value;
        assertEqual('Nouvelle ligne herite du LTA precedent', lastLta, 'ABC123');
    })();

    // --- removeRow ---
    suite('removeRow');
    (function() {
        resetDOM();
        addUld();
        addRow(uldCount);
        var block = document.querySelector('.uld-block');
        var rowsBefore = block.querySelectorAll('.uld-rows tr').length;
        var btn = block.querySelectorAll('.uld-rows tr')[0].querySelector('.btn-danger');
        removeRow(btn, uldCount);
        var rowsAfter = block.querySelectorAll('.uld-rows tr').length;
        assertEqual('removeRow supprime 1 ligne', rowsAfter, rowsBefore - 1);
    })();

    // --- removeUld ---
    suite('removeUld');
    (function() {
        resetDOM();
        addUld();
        addUld();
        var countBefore = document.querySelectorAll('.uld-block').length;
        removeUld(1);
        var countAfter = document.querySelectorAll('.uld-block').length;
        assertEqual('removeUld supprime 1 bloc', countAfter, countBefore - 1);
    })();

    // --- updateTotals ---
    suite('updateTotals');
    (function() {
        resetDOM();
        addUld();
        var block = document.querySelector('.uld-block');
        block.querySelector('.colis-input').value = '5';
        addRow(uldCount);
        var rows = block.querySelectorAll('.uld-rows tr');
        rows[1].querySelector('.colis-input').value = '3';
        updateTotals(uldCount);
        var total = block.querySelector('.total-colis').textContent;
        assertEqual('Total colis = 5 + 3 = 8', total, '8');
    })();

    // --- collectData ---
    suite('collectData');
    (function() {
        resetDOM();
        manifestId = 'MAN-TEST-001';
        document.getElementById('clientName').value = 'TestClient';
        document.getElementById('agentName').value = 'TestAgent';
        document.getElementById('destAirport').value = 'cdg';
        document.getElementById('recipients').value = 'a@b.com';
        document.getElementById('cc').value = 'c@d.com';

        addUld();
        var block = document.querySelector('.uld-block');
        block.querySelector('.uld-number').value = 'PMC-001';
        block.querySelector('.uld-weight').value = '150.5';
        block.querySelector('.lta-input').value = 'LTA1';
        block.querySelector('.dossier-input').value = 'DOS1';
        block.querySelector('.colis-input').value = '10';
        block.querySelector('.dgr-input').value = 'O';
        block.querySelector('.comment-input').value = 'Fragile';

        var data = collectData();
        assertEqual('manifestId', data.manifestId, 'MAN-TEST-001');
        assertEqual('client', data.client, 'TestClient');
        assertEqual('agent', data.agent, 'TestAgent');
        assertEqual('destAirport uppercase', data.destAirport, 'CDG');
        assertEqual('recipients', data.recipients, 'a@b.com');
        assertEqual('cc', data.cc, 'c@d.com');
        assertEqual('1 ULD', data.ulds.length, 1);
        assertEqual('ULD number', data.ulds[0].uldNumber, 'PMC-001');
        assertEqual('ULD weight', data.ulds[0].weight, 150.5);
        assertEqual('ULD totalColis', data.ulds[0].totalColis, 10);
        assertEqual('Row LTA', data.ulds[0].rows[0].lta, 'LTA1');
        assertEqual('Row dossier', data.ulds[0].rows[0].dossier, 'DOS1');
        assertEqual('Row colis', data.ulds[0].rows[0].colis, 10);
        assertEqual('Row DGR', data.ulds[0].rows[0].dgr, 'O');
        assertEqual('Row comment', data.ulds[0].rows[0].comment, 'Fragile');
    })();

    // --- collectData sans poids ---
    suite('collectData - poids optionnel');
    (function() {
        resetDOM();
        manifestId = 'MAN-TEST-002';
        document.getElementById('agentName').value = 'Agent';
        document.getElementById('destAirport').value = 'ORY';
        addUld();
        var block = document.querySelector('.uld-block');
        block.querySelector('.uld-number').value = 'ULD-X';
        // poids laisse vide
        block.querySelector('.colis-input').value = '2';
        var data = collectData();
        assert('Pas de propriete weight si vide', data.ulds[0].weight === undefined);
    })();

    // --- getAllLtas ---
    suite('getAllLtas');
    (function() {
        var data = {
            ulds: [
                { rows: [{ lta: 'LTA1' }, { lta: 'LTA2' }, { lta: 'LTA1' }] },
                { rows: [{ lta: 'LTA3' }, { lta: '' }] }
            ]
        };
        var ltas = getAllLtas(data);
        assertEqual('3 LTA uniques', ltas.length, 3);
        assert('Contient LTA1', ltas.indexOf('LTA1') >= 0);
        assert('Contient LTA2', ltas.indexOf('LTA2') >= 0);
        assert('Contient LTA3', ltas.indexOf('LTA3') >= 0);
    })();

    // --- getAllLtas backward compat pmcs ---
    suite('getAllLtas - retro-compat pmcs');
    (function() {
        var data = {
            pmcs: [{ rows: [{ lta: 'OLD-LTA' }] }]
        };
        var ltas = getAllLtas(data);
        assertEqual('LTA depuis pmcs', ltas.length, 1);
        assertEqual('Valeur', ltas[0], 'OLD-LTA');
    })();

    // --- validateRequired ---
    suite('validateRequired');
    (function() {
        resetDOM();
        _alertLog = [];

        document.getElementById('agentName').value = '';
        document.getElementById('destAirport').value = 'CDG';
        var r1 = validateRequired();
        assertEqual('Agent vide => false', r1, false);
        assert('Alert agent', _alertLog.length > 0);

        _alertLog = [];
        document.getElementById('agentName').value = 'Agent';
        document.getElementById('destAirport').value = 'XX';
        var r2 = validateRequired();
        assertEqual('Dest 2 lettres => false', r2, false);

        _alertLog = [];
        document.getElementById('destAirport').value = 'CDG';
        var r3 = validateRequired();
        assertEqual('Agent + Dest OK => true', r3, true);

    })();

    // --- save / load manifest ---
    suite('saveManifest / loadManifest');
    await (async function() {
        resetDOM();
        _alertLog = [];

        manifestId = 'MAN-SAVE-TEST';
        document.getElementById('agentName').value = 'SaveAgent';
        document.getElementById('destAirport').value = 'JFK';
        document.getElementById('clientName').value = 'SaveClient';
        document.getElementById('recipients').value = 'save@test.com';
        document.getElementById('cc').value = 'cc@test.com';
        addUld();
        var block = document.querySelector('.uld-block');
        block.querySelector('.uld-number').value = 'ULD-SAVE';
        block.querySelector('.uld-weight').value = '200';
        block.querySelector('.lta-input').value = 'LTA-S';
        block.querySelector('.colis-input').value = '7';
        block.querySelector('.dgr-input').value = 'O';

        await saveManifest();
        var saved = await getSavedManifests();
        assertEqual('1 manifeste sauvegarde', saved.length, 1);
        assertEqual('ID correct', saved[0].manifestId, 'MAN-SAVE-TEST');
        assertEqual('Weight sauvegarde', saved[0].ulds[0].weight, 200);
        assertEqual('Recipients sauvegarde', saved[0].recipients, 'save@test.com');
        assertEqual('CC sauvegarde', saved[0].cc, 'cc@test.com');

        // Reset et reload
        document.getElementById('pmcContainer').innerHTML = '';
        document.getElementById('clientName').value = '';
        document.getElementById('recipients').value = '';
        document.getElementById('cc').value = '';
        uldCount = 0;
        await loadManifest('MAN-SAVE-TEST');

        assertEqual('Client restaure', document.getElementById('clientName').value, 'SaveClient');
        assertEqual('Agent restaure', document.getElementById('agentName').value, 'SaveAgent');
        assertEqual('Dest restaure', document.getElementById('destAirport').value, 'JFK');
        assertEqual('Recipients restaure', document.getElementById('recipients').value, 'save@test.com');
        assertEqual('CC restaure', document.getElementById('cc').value, 'cc@test.com');

        var loadedBlock = document.querySelector('.uld-block');
        assert('ULD block restaure', !!loadedBlock);
        assertEqual('ULD number restaure', loadedBlock.querySelector('.uld-number').value, 'ULD-SAVE');
        assertEqual('ULD weight restaure', loadedBlock.querySelector('.uld-weight').value, '200');
        assertEqual('LTA restaure', loadedBlock.querySelector('.lta-input').value, 'LTA-S');
        assertEqual('Colis restaure', loadedBlock.querySelector('.colis-input').value, '7');
        assertEqual('DGR restaure', loadedBlock.querySelector('.dgr-input').value, 'O');
        assertEqual('Total colis recalcule', loadedBlock.querySelector('.total-colis').textContent, '7');

    })();

    // --- Load manifest affiche la section envoi si recipients ---
    suite('loadManifest - section envoi auto-affichee');
    await (async function() {
        resetDOM();
        _alertLog = [];

        manifestId = 'MAN-RECIP-TEST';
        document.getElementById('agentName').value = 'Ag';
        document.getElementById('destAirport').value = 'CDG';
        document.getElementById('recipients').value = 'dest@test.com';
        addUld();
        document.querySelector('.uld-block .colis-input').value = '1';
        await saveManifest();

        document.getElementById('pmcContainer').innerHTML = '';
        document.getElementById('generateSection').style.display = 'none';
        uldCount = 0;

        await loadManifest('MAN-RECIP-TEST');
        var display = document.getElementById('generateSection').style.display;
        assertEqual('Section envoi visible quand recipients present', display, 'block');

        resetDOM();
        manifestId = 'MAN-NO-RECIP';
        document.getElementById('agentName').value = 'Ag';
        document.getElementById('destAirport').value = 'CDG';
        addUld();
        document.querySelector('.uld-block .colis-input').value = '1';
        await saveManifest();

        document.getElementById('pmcContainer').innerHTML = '';
        document.getElementById('generateSection').style.display = 'none';
        uldCount = 0;

        await loadManifest('MAN-NO-RECIP');
        var display2 = document.getElementById('generateSection').style.display;
        assertEqual('Section envoi cachee sans recipients', display2, 'none');

    })();

    // --- Retro-compat ancien format pmcs ---
    suite('Retro-compatibilite ancien format (pmcs)');
    await (async function() {
        resetDOM();
        _alertLog = [];

        var oldData = {
            manifestId: 'MAN-OLD-001',
            client: 'OldClient',
            agent: 'OldAgent',
            destAirport: 'LHR',
            date: '01/01/2024',
            timestamp: '2024-01-01T10:00:00.000Z',
            recipients: '',
            cc: '',
            pmcs: [{
                pmcNumber: 'PMC-OLD',
                rows: [{ lta: 'LTA-OLD', dossier: 'D1', colis: 3, dgr: 'N', comment: 'Test' }],
                totalColis: 3
            }]
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify([oldData]));
        await loadManifest('MAN-OLD-001');

        var block = document.querySelector('.uld-block');
        assert('Ancien format charge un bloc ULD', !!block);
        assertEqual('pmcNumber mappe sur uld-number', block.querySelector('.uld-number').value, 'PMC-OLD');
        assertEqual('LTA charge', block.querySelector('.lta-input').value, 'LTA-OLD');
        assertEqual('Poids vide (absent ancien format)', block.querySelector('.uld-weight').value, '');

    })();

    // ========================================
    // MATERIEL ULD (Phase 1 - Plan 01)
    // ========================================

    // --- collectData: nouveaux champs materiel ---
    suite('Materiel ULD - collectData nouveaux champs');
    (function() {
        resetDOM();
        manifestId = 'MAN-MAT-001';
        document.getElementById('agentName').value = 'Ag';
        document.getElementById('destAirport').value = 'CDG';
        addUld();
        var block = document.querySelector('.uld-block');
        // Ecrire directement les data-attributes (simulant applyMaterialToUld)
        block.setAttribute('data-straps', '5');
        block.setAttribute('data-flooring-eu', '0');
        block.setAttribute('data-flooring-eu-forfait', 'true');
        block.setAttribute('data-flooring-std', '3');
        block.setAttribute('data-flooring-std-forfait', 'false');
        block.setAttribute('data-blocks', '2');
        block.setAttribute('data-tarps', '1');
        block.setAttribute('data-dividers', '4');
        block.setAttribute('data-honeycomb', '7');
        block.setAttribute('data-uld-comment', 'Fragile');

        var data = collectData();
        var u = data.ulds[0];
        assertEqual('strapsCount number', u.strapsCount, 5);
        assertEqual('flooringEuCount number', u.flooringEuCount, 0);
        assertEqual('flooringEuForfait boolean true', u.flooringEuForfait, true);
        assertEqual('flooringStdCount number', u.flooringStdCount, 3);
        assertEqual('flooringStdForfait boolean false', u.flooringStdForfait, false);
        assertEqual('blocksCount number', u.blocksCount, 2);
        assertEqual('tarpsCount number', u.tarpsCount, 1);
        assertEqual('dividersCount number', u.dividersCount, 4);
        assertEqual('honeycombCount number', u.honeycombCount, 7);
        assertEqual('uldComment string', u.uldComment, 'Fragile');
        assert('strapsCount is number type', typeof u.strapsCount === 'number');
        assert('flooringEuForfait is boolean type', typeof u.flooringEuForfait === 'boolean');
        assert('uldComment is string type', typeof u.uldComment === 'string');
    })();

    // --- collectData: valeurs par defaut (addUld sans saisie) ---
    suite('Materiel ULD - collectData defaults');
    (function() {
        resetDOM();
        manifestId = 'MAN-MAT-002';
        document.getElementById('agentName').value = 'Ag';
        document.getElementById('destAirport').value = 'CDG';
        addUld();
        var data = collectData();
        var u = data.ulds[0];
        assertEqual('strapsCount default 0', u.strapsCount, 0);
        assertEqual('flooringEuCount default 0', u.flooringEuCount, 0);
        assertEqual('flooringEuForfait default false', u.flooringEuForfait, false);
        assertEqual('flooringStdCount default 0', u.flooringStdCount, 0);
        assertEqual('flooringStdForfait default false', u.flooringStdForfait, false);
        assertEqual('blocksCount default 0', u.blocksCount, 0);
        assertEqual('tarpsCount default 0', u.tarpsCount, 0);
        assertEqual('dividersCount default 0', u.dividersCount, 0);
        assertEqual('honeycombCount default 0', u.honeycombCount, 0);
        assertEqual('uldComment default empty string', u.uldComment, '');
    })();

    // --- loadManifest: retro-compat MAT-10 / TEST-02 ---
    suite('Materiel ULD - loadManifest retro-compat (TEST-02)');
    await (async function() {
        resetDOM();
        _alertLog = [];

        // Ancien manifeste SANS aucun champ materiel
        var oldData = {
            manifestId: 'MAN-MAT-OLD',
            client: 'OldC',
            agent: 'OldA',
            destAirport: 'CDG',
            date: '01/01/2025',
            timestamp: '2025-01-01T00:00:00.000Z',
            recipients: '',
            cc: '',
            ulds: [{
                uldNumber: 'ULD-OLD',
                rows: [{ lta: 'LTA-OLD', dossier: 'D', colis: 2, dgr: 'N', comment: 'C' }],
                totalColis: 2
            }]
        };
        await writeSavedManifests([oldData]);

        var noError = true;
        try { await loadManifest('MAN-MAT-OLD'); } catch(e) { noError = false; }
        assert('loadManifest ne crash pas sur ancien format sans materiel', noError);

        var block = document.querySelector('.uld-block');
        assert('Bloc ULD charge', !!block);
        assertEqual('data-straps default 0', block.getAttribute('data-straps'), '0');
        assertEqual('data-flooring-eu default 0', block.getAttribute('data-flooring-eu'), '0');
        assertEqual('data-flooring-eu-forfait default false', block.getAttribute('data-flooring-eu-forfait'), 'false');
        assertEqual('data-flooring-std default 0', block.getAttribute('data-flooring-std'), '0');
        assertEqual('data-flooring-std-forfait default false', block.getAttribute('data-flooring-std-forfait'), 'false');
        assertEqual('data-blocks default 0', block.getAttribute('data-blocks'), '0');
        assertEqual('data-tarps default 0', block.getAttribute('data-tarps'), '0');
        assertEqual('data-dividers default 0', block.getAttribute('data-dividers'), '0');
        assertEqual('data-honeycomb default 0', block.getAttribute('data-honeycomb'), '0');
        assertEqual('data-uld-comment default empty', block.getAttribute('data-uld-comment'), '');

        // collectData apres load doit retourner les defaults
        var data = collectData();
        assertEqual('collectData apres load: strapsCount 0', data.ulds[0].strapsCount, 0);
        assertEqual('collectData apres load: uldComment vide', data.ulds[0].uldComment, '');
        assertEqual('collectData apres load: flooringEuForfait false', data.ulds[0].flooringEuForfait, false);
    })();

    // --- loadManifest: nouveau format ---
    suite('Materiel ULD - loadManifest nouveau format');
    await (async function() {
        resetDOM();
        _alertLog = [];

        var newData = {
            manifestId: 'MAN-MAT-NEW',
            client: 'NewC',
            agent: 'NewA',
            destAirport: 'CDG',
            date: '01/01/2025',
            timestamp: '2025-01-01T00:00:00.000Z',
            recipients: '',
            cc: '',
            ulds: [{
                uldNumber: 'ULD-NEW',
                rows: [{ lta: 'LTA-NEW', dossier: 'D', colis: 3, dgr: 'N', comment: 'C' }],
                totalColis: 3,
                strapsCount: 8,
                flooringEuCount: 0,
                flooringEuForfait: true,
                flooringStdCount: 2,
                flooringStdForfait: false,
                blocksCount: 1,
                tarpsCount: 0,
                dividersCount: 5,
                honeycombCount: 3,
                uldComment: 'Attention'
            }]
        };
        await writeSavedManifests([newData]);
        await loadManifest('MAN-MAT-NEW');

        var block = document.querySelector('.uld-block');
        assertEqual('data-straps restaure', block.getAttribute('data-straps'), '8');
        assertEqual('data-flooring-eu restaure', block.getAttribute('data-flooring-eu'), '0');
        assertEqual('data-flooring-eu-forfait restaure true', block.getAttribute('data-flooring-eu-forfait'), 'true');
        assertEqual('data-flooring-std restaure', block.getAttribute('data-flooring-std'), '2');
        assertEqual('data-flooring-std-forfait restaure false', block.getAttribute('data-flooring-std-forfait'), 'false');
        assertEqual('data-blocks restaure', block.getAttribute('data-blocks'), '1');

    // Si sendEmail change, buildEmailHtmlForTest doit suivre (code reviewer humain).
    function buildEmailHtmlForTest(data) {
        var allLtas = getAllLtas(data).join(', ') || '-';
        var grandTotal = data.ulds.reduce(function(s, u) { return s + u.totalColis; }, 0);
        var html = '<div style="font-family:Arial,sans-serif;max-width:700px;">';
        html += '<h2 style="color:#1a3a5c;">Loadsheet - ' + esc(data.manifestId) + '</h2>';
        html += '<p><strong>Client :</strong> ' + esc(data.client || '-') + ' | <strong>Dest :</strong> ' + esc(data.destAirport) + ' | <strong>Agent :</strong> ' + esc(data.agent) + '</p>';
        html += '<p><strong>Date :</strong> ' + esc(data.date) + ' | <strong>LTA :</strong> ' + esc(allLtas) + '</p>';
        html += '<hr style="border-color:#1a3a5c;">';
        html += '<h3 style="color:#1a3a5c;">Recapitulatif (' + data.ulds.length + ' ULD - ' + grandTotal + ' colis)</h3>';
        var emailHasWeight = data.ulds.some(function(u) { return u.weight > 0; });
        html += '<table style="width:100%;border-collapse:collapse;font-size:14px;">';
        html += emailHasWeight
            ? '<tr style="background:#1a3a5c;color:#fff;"><th style="padding:8px;text-align:left;">ULD</th><th>LTA(s)</th><th>Nb Colis</th><th>Poids (kg)</th><th>DGR</th></tr>'
            : '<tr style="background:#1a3a5c;color:#fff;"><th style="padding:8px;text-align:left;">ULD</th><th>LTA(s)</th><th>Nb Colis</th><th>DGR</th></tr>';
        data.ulds.forEach(function(u, idx) {
            var ltaSet = {};
            u.rows.forEach(function(r) { if (r.lta) ltaSet[r.lta] = true; });
            var bg = idx % 2 === 0 ? '#f5f7fa' : '#fff';
            var hasDgr = u.rows.some(function(r) { return r.dgr === 'O'; });
            html += '<tr style="background:' + bg + ';"><td style="padding:6px 8px;">' + esc(u.uldNumber) + '</td><td>' + esc(Object.keys(ltaSet).join(', ')) + '</td><td style="text-align:center;">' + u.totalColis + '</td>';
            if (emailHasWeight) html += '<td style="text-align:center;">' + (u.weight ? u.weight : '-') + '</td>';
            html += '<td style="text-align:center;' + (hasDgr ? 'color:red;font-weight:bold;' : '') + '">' + (hasDgr ? 'OUI' : 'NON') + '</td></tr>';
        });
        var emailGrandWeight = data.ulds.reduce(function(s, u) { return s + (u.weight || 0); }, 0);
        if (emailHasWeight) {
            html += '<tr style="background:#e2e8f0;font-weight:bold;"><td style="padding:6px 8px;">TOTAL</td><td></td><td style="text-align:center;">' + grandTotal + '</td><td style="text-align:center;">' + emailGrandWeight + '</td><td></td></tr>';
        } else {
            html += '<tr style="background:#e2e8f0;font-weight:bold;"><td style="padding:6px 8px;">TOTAL</td><td></td><td style="text-align:center;">' + grandTotal + '</td><td></td></tr>';
        }
        html += '</table>';
        // D-14 miroir D-12 : scission Palettes/Vrac (conditionnelle)
        var pvSplit = buildPalettesVracSplit(data.ulds);
        if (pvSplit.hasVrac) {
            html += '<h3 style="color:#1a3a5c;margin-top:14px;">Detail par categorie</h3>';
            html += '<table style="border-collapse:collapse;font-size:13px;">';
            html += '<tr><td style="padding:4px 10px;background:#f0f4f8;font-weight:600;">dont Palettes</td>';
            html += '<td style="padding:4px 10px;">' + pvSplit.palettes.count + ' (' + pvSplit.palettes.colis + ' colis, ' + pvSplit.palettes.weight + ' kg)</td></tr>';
            html += '<tr><td style="padding:4px 10px;background:#f0f4f8;font-weight:600;">dont Vrac</td>';
            html += '<td style="padding:4px 10px;">' + pvSplit.vrac.count + ' (' + pvSplit.vrac.colis + ' colis, ' + pvSplit.vrac.weight + ' kg)</td></tr>';
            html += '</table>';
        }
        html += buildMaterialSummaryHtml(data.ulds);
        data.ulds.forEach(function(u) {
            // D-14 mirror D-11 : titre du bloc inclut type + esc() defense en profondeur
            var validUldType = (u.type && ['PMC','AKE','AKN','PAG','VRAC'].indexOf(u.type) >= 0) ? u.type : 'PMC';
            var uldTitle = 'ULD : ' + esc(u.uldNumber) + ' [' + esc(validUldType) + ']';
            if (u.weight > 0) uldTitle += ' — ' + u.weight + ' kg';
            html += '<h3 style="color:#1a3a5c;margin-top:20px;">' + uldTitle + '</h3>';
            html += '<table style="width:100%;border-collapse:collapse;font-size:13px;">';
            html += '<tr style="background:#1a3a5c;color:#fff;"><th style="padding:6px;">LTA</th><th>Dossier</th><th>Colis</th><th>DGR</th><th>Commentaire</th></tr>';
            u.rows.forEach(function(r, idx) {
                var bg = idx % 2 === 0 ? '#f5f7fa' : '#fff';
                html += '<tr style="background:' + bg + ';"><td style="padding:4px 6px;">' + esc(r.lta) + '</td><td>' + esc(r.dossier) + '</td><td style="text-align:center;">' + r.colis + '</td><td style="text-align:center;' + (r.dgr === 'O' ? 'color:red;font-weight:bold;' : '') + '">' + esc(r.dgr) + '</td><td>' + esc(r.comment) + '</td></tr>';
            });
            html += '<tr style="background:#e2e8f0;font-weight:bold;"><td></td><td>TOTAL</td><td style="text-align:center;">' + u.totalColis + '</td><td></td><td></td></tr>';
            html += '</table>';
            html += buildUldMaterialHtml(u);
        });
        html += '</div>';
        return html;
    }

    // --- Session auth (isLoggedIn simulation) ---
    suite('SECU - Session auth');
    (function() {
        var AUTH_KEY = 'loadsheet_auth';
        // Session expiree
        sessionStorage.setItem(AUTH_KEY, JSON.stringify({ expiry: Date.now() - 1000 }));
        var session = JSON.parse(sessionStorage.getItem(AUTH_KEY));
        assert('Session expiree detectee', session.expiry <= Date.now());

        // Session valide
        sessionStorage.setItem(AUTH_KEY, JSON.stringify({ expiry: Date.now() + 60000 }));
        session = JSON.parse(sessionStorage.getItem(AUTH_KEY));
        assert('Session valide detectee', session.expiry > Date.now());

        // Session corrompue
        sessionStorage.setItem(AUTH_KEY, 'not-json');
        var valid = false;
        try {
            session = JSON.parse(sessionStorage.getItem(AUTH_KEY));
            valid = session && session.expiry > Date.now();
        } catch(e) { valid = false; }
        assertEqual('Session corrompue => invalide', valid, false);

        // Session sans expiry (Phase 3 D-01, D-02 : fix court-circuit qui retournait undefined)
        sessionStorage.setItem(AUTH_KEY, JSON.stringify({ jwt: 'fake' }));
        session = JSON.parse(sessionStorage.getItem(AUTH_KEY));
        valid = !!(session && typeof session.expiry === 'number' && session.expiry > Date.now());
        assertEqual('Session sans expiry => invalide', valid, false);

        // Session avec expiry null (ex-NaN serialise) (Phase 3 D-03, durcissement)
        // Note: JSON.stringify(NaN) produit "null", donc session.expiry sera null cote parse.
        sessionStorage.setItem(AUTH_KEY, JSON.stringify({ expiry: NaN }));
        session = JSON.parse(sessionStorage.getItem(AUTH_KEY));
        valid = !!(session && typeof session.expiry === 'number' && session.expiry > Date.now());
        assertEqual('Session avec expiry null (ex-NaN) => invalide', valid, false);

        // Session avec expiry string (Phase 3 D-03, durcissement) - refus coercition implicite
        sessionStorage.setItem(AUTH_KEY, JSON.stringify({ expiry: "9999999999999" }));
        session = JSON.parse(sessionStorage.getItem(AUTH_KEY));
        valid = !!(session && typeof session.expiry === 'number' && session.expiry > Date.now());
        assertEqual('Session avec expiry string => invalide', valid, false);

        // Session avec expiry negatif (Phase 3 D-03, durcissement) - passe tres lointain
        sessionStorage.setItem(AUTH_KEY, JSON.stringify({ expiry: -1 }));
        session = JSON.parse(sessionStorage.getItem(AUTH_KEY));
        valid = !!(session && typeof session.expiry === 'number' && session.expiry > Date.now());
        assertEqual('Session avec expiry negatif => invalide', valid, false);

        // Cleanup
        sessionStorage.removeItem(AUTH_KEY);
    })();

    // --- Validation emails serveur (replica de la logique api/send-email) ---
    suite('SECU - Validation emails (separateurs et formats)');
    (function() {
        // Replica exacte de la logique serveur pour tester cote navigateur
        var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        var angleBracketRegex = /<([^>]+)>/;
        function validateEmails(str) {
            return str.split(/[,;]/).map(function(e) { return e.trim(); }).filter(Boolean).map(function(e) {
                var match = angleBracketRegex.exec(e);
                return match ? match[1].trim() : e;
            }).filter(function(e) {
                return emailRegex.test(e);
            });
        }

        // Separateur virgule
        var r1 = validateEmails('a@b.com, c@d.com');
        assertEqual('Virgule: 2 emails', r1.length, 2);

        // Separateur point-virgule
        var r2 = validateEmails('a@b.com; c@d.com');
        assertEqual('Point-virgule: 2 emails', r2.length, 2);

        // Mix virgule et point-virgule
        var r3 = validateEmails('a@b.com, c@d.com; e@f.org');
        assertEqual('Mix separateurs: 3 emails', r3.length, 3);

        // Format "Nom <email>"
        var r4 = validateEmails('John Doe <john@test.com>, Jane <jane@test.com>');
        assertEqual('Angle brackets: 2 emails', r4.length, 2);
        assertEqual('Angle brackets: email extrait', r4[0], 'john@test.com');

        // Format mixte
        var r5 = validateEmails('plain@test.com; Nom <bracket@test.com>');
        assertEqual('Mix plain + brackets', r5.length, 2);

        // Email unique
        var r6 = validateEmails('solo@test.com');
        assertEqual('Email unique', r6.length, 1);

        // Chaine vide
        var r7 = validateEmails('');
        assertEqual('Chaine vide: 0 email', r7.length, 0);

        // Adresses invalides rejetees
        var r8 = validateEmails('pas-un-email, @broken, ok@valid.com');
        assertEqual('Filtre invalides: 1 seul valide', r8.length, 1);
        assertEqual('Filtre invalides: le bon passe', r8[0], 'ok@valid.com');

        // Injection CRLF rejetee
        var r9 = validateEmails('evil@test.com\\r\\nBcc: spam@hack.com');
        assertEqual('Injection CRLF rejetee', r9.length, 0);
    })();

    // ========================================
    // E2E anti-regression : manifeste complet lifecycle (Phase 3 D-04, D-05, D-06)

    // Scenario 12 etapes : newManifest -> 2 ULDs (PMC materiel complet + VRAC materiel partiel + XSS)
    //   -> LTA -> save -> reset -> load -> asserts -> buildPdf -> buildPalettesVracSplit.
    // Si cette suite FAIL : symptome clair d'une regression majeure sur le happy path.
    // ========================================
    suite('E2E - manifest complet lifecycle');
    await (async function() {
        // --- Etape 1 : Setup ---
        window._xss = 0;
        resetDOM();
        manifestId = 'MAN-E2E-LIFECYCLE';

        var sel2 = uld2.querySelector('.uld-type');

        uld2.setAttribute('data-straps', '4');
        uld2.setAttribute('data-dividers', '6');
        uld2.setAttribute('data-uld-comment', '<script>window._xss++<\/script>');

        // --- Etape 5 : ligne LTA sur ULD 1 (addUld ajoute deja 1 ligne par defaut, on ne rajoute pas) ---
        // ULD 1 a deja 1 row par defaut (addUld appelle addRow) ; on remplit cette row.

        var row1 = uld1.querySelector('.uld-rows tr');
        row1.querySelector('.lta-input').value = '020-12345678';

        // --- Etape 7 : saveManifest (round-trip localStorage chiffre) ---
        await saveManifest();

        // --- Etape 8 : reset DOM + verifier que le DOM est vide ---
        document.getElementById('pmcContainer').innerHTML = '';
        document.getElementById('clientName').value = '';
        document.getElementById('agentName').value = '';
        document.getElementById('destAirport').value = '';
        document.getElementById('recipients').value = '';

        assertEqual('DOM vide apres reset', document.querySelectorAll('.uld-block').length, 0);

        // --- Etape 9 : loadManifest (recharge depuis localStorage chiffre) ---
        await loadManifest('MAN-E2E-LIFECYCLE');

        // --- Etape 10 : asserts round-trip ---
        var blocks = document.querySelectorAll('.uld-block');
        assertEqual('2 ULDs chargees apres load', blocks.length, 2);
        assertEqual('Client restaure', document.getElementById('clientName').value, 'ACME Paris');
        assertEqual('Agent restaure', document.getElementById('agentName').value, 'Jean Martin');
        assertEqual('Destinataire restaure', document.getElementById('destAirport').value, 'CDG');
        assertEqual('Recipients restaure', document.getElementById('recipients').value, 'ops@acme.fr');

        assertEqual('Type ULD 1 = PMC', blocks[0].querySelector('.uld-type').value, 'PMC');
        assertEqual('Type ULD 2 = VRAC', blocks[1].querySelector('.uld-type').value, 'VRAC');

        assertEqual('Sangles ULD 1 restaurees', blocks[0].dataset.straps, '8');
        assertEqual('Forfait EU ULD 1 restaure', blocks[0].dataset.flooringEuForfait, 'true');
        assertEqual('Baches ULD 1 restaurees', blocks[0].dataset.tarps, '2');
        assertEqual('Commentaire ULD 1 restaure', blocks[0].dataset.uldComment, 'Fragile - ne pas gerber');

        assertEqual('Sangles ULD 2 VRAC', blocks[1].dataset.straps, '4');
        assertEqual('Intercalaires ULD 2 VRAC', blocks[1].dataset.dividers, '6');

        // Assertion securite critique (MAT-11 + Phase 3 smoke) :
        assertEqual('XSS uldComment NON execute (window._xss reste a 0)', window._xss, 0);
        assert('Commentaire XSS stocke brut dans dataset (defense est au rendu, pas au stockage)',
               blocks[1].dataset.uldComment.indexOf('<script>') >= 0);

        // Recap ecran contient "dont Vrac : 1"
        updateRecap();
